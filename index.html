<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영어 공부장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF9;
    --surface: #FFFFFF;
    --border: #E7E5E2;
    --ink: #17171A;
    --ink-soft: #71706B;
    --accent: #2F5D50;
    --accent-soft: #E7F0EC;
    --amber: #B5822A;
    --amber-soft: #FBF1E1;
    --ring: rgba(23, 23, 26, 0.06);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 0 0 80px;
    -webkit-font-smoothing: antialiased;
  }

  header {
    padding: 64px 24px 32px;
    max-width: 720px;
    margin: 0 auto;
  }

  header .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    font-weight: 500;
  }

  header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: clamp(30px, 5vw, 42px);
    letter-spacing: -0.02em;
    margin: 0 0 12px;
    line-height: 1.15;
  }

  header p.sub {
    color: var(--ink-soft);
    font-size: 15px;
    line-height: 1.5;
    max-width: 460px;
    margin: 0;
  }

  .toolbar {
    max-width: 720px;
    margin: 8px auto 0;
    padding: 0 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .toolbar input[type="text"] {
    flex: 1;
    min-width: 180px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  .toolbar input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .chip {
    padding: 9px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    user-select: none;
    transition: all 0.15s ease;
    white-space: nowrap;
  }

  .chip:hover {
    border-color: var(--ink-soft);
    color: var(--ink);
  }

  .chip.active {
    background: var(--ink);
    color: var(--surface);
    border-color: var(--ink);
  }

  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 36px 24px 0;
  }

  .day-group {
    margin-bottom: 36px;
  }

  .day-heading {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 14px;
  }

  .card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 20px 22px;
    margin-bottom: 12px;
    transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
  }

  .card.src-npr { border-left-color: var(--amber); }

  .card:hover {
    box-shadow: 0 4px 16px var(--ring);
    transform: translateY(-1px);
  }

  .card-source {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 3px 9px;
    border-radius: 5px;
    margin-bottom: 12px;
  }

  .card.src-npr .card-source {
    color: var(--amber);
    background: var(--amber-soft);
  }

  .card h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 17.5px;
    letter-spacing: -0.01em;
    line-height: 1.4;
    margin: 0 0 8px;
  }

  .card h2 a {
    color: var(--ink);
    text-decoration: none;
  }

  .card h2 a:hover {
    color: var(--accent);
  }

  .card p.summary {
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink-soft);
    margin: 0 0 14px;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .read-toggle {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12.5px;
    color: var(--ink-soft);
    cursor: pointer;
    user-select: none;
  }

  .read-toggle input {
    accent-color: var(--accent);
    width: 14px;
    height: 14px;
    cursor: pointer;
  }

  .card.is-read {
    opacity: 0.5;
  }

  .read-link {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--accent);
    text-decoration: none;
  }
  .read-link:hover { text-decoration: underline; }

  .empty-state, .loading-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--ink-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  footer {
    text-align: center;
    margin-top: 40px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Daily English Notebook</div>
  <h1>영어 공부장</h1>
  <p class="sub">매일 자동으로 쌓이는 비즈니스 뉴스. 하루 5분, 꾸준히 채워갑니다.</p>
</header>

<div class="toolbar">
  <input type="text" id="searchInput" placeholder="검색 (제목, 요약)...">
  <div class="chip active" data-source="all">전체</div>
  <div class="chip" data-source="BBC Business">BBC</div>
  <div class="chip" data-source="NPR Economy">NPR</div>
  <div class="chip" id="unreadOnly" data-toggle="unread">안 읽은 것만</div>
</div>

<main id="main">
  <div class="loading-state">불러오는 중...</div>
</main>

<footer>매일 06:00 KST · GitHub Actions로 자동 수집</footer>

<script>
  const state = {
    articles: [],
    sourceFilter: 'all',
    query: '',
    unreadOnly: false,
    readIds: new Set(JSON.parse(localStorage.getItem('readIds') || '[]')),
  };

  function saveReadIds() {
    localStorage.setItem('readIds', JSON.stringify([...state.readIds]));
  }

  function formatDayLabel(dateStr) {
    const d = new Date(dateStr);
    if (isNaN(d)) return '날짜 미상';
    const opts = { month: 'long', day: 'numeric', weekday: 'short' };
    return d.toLocaleDateString('ko-KR', opts);
  }

  function dayKey(dateStr) {
    const d = new Date(dateStr);
    if (isNaN(d)) return 'unknown';
    return d.toISOString().slice(0, 10);
  }

  function sourceClass(source) {
    return source === 'NPR Economy' ? 'src-npr' : 'src-bbc';
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  function render() {
    const main = document.getElementById('main');

    let filtered = state.articles.filter(a => {
      if (state.sourceFilter !== 'all' && a.source !== state.sourceFilter) return false;
      if (state.unreadOnly && state.readIds.has(a.id)) return false;
      if (state.query) {
        const q = state.query.toLowerCase();
        const hay = (a.title + ' ' + a.summary).toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    if (filtered.length === 0) {
      main.innerHTML = '<div class="empty-state">조건에 맞는 기사가 없어요.<br>필터를 바꾸거나, 첫 자동 수집을 기다려보세요.</div>';
      return;
    }

    const groups = {};
    filtered.forEach(a => {
      const key = dayKey(a.published || a.collected_at);
      if (!groups[key]) groups[key] = [];
      groups[key].push(a);
    });

    const sortedKeys = Object.keys(groups).sort((a, b) => b.localeCompare(a));

    let html = '';
    sortedKeys.forEach(key => {
      const items = groups[key];
      const label = key === 'unknown' ? '날짜 미상' : formatDayLabel(items[0].published || items[0].collected_at);
      html += `<div class="day-group"><div class="day-heading">${label}</div>`;
      items.forEach((a) => {
        const isRead = state.readIds.has(a.id);
        html += `
          <div class="card ${sourceClass(a.source)} ${isRead ? 'is-read' : ''}" data-id="${escapeHtml(a.id)}">
            <div class="card-source">${escapeHtml(a.source)}</div>
            <h2><a href="${escapeHtml(a.link)}" target="_blank" rel="noopener">${escapeHtml(a.title)}</a></h2>
            <p class="summary">${escapeHtml(a.summary)}</p>
            <div class="card-footer">
              <label class="read-toggle">
                <input type="checkbox" ${isRead ? 'checked' : ''} data-id="${escapeHtml(a.id)}">
                읽음 표시
              </label>
              <a class="read-link" href="${escapeHtml(a.link)}" target="_blank" rel="noopener">원문 읽기 →</a>
            </div>
          </div>
        `;
      });
      html += `</div>`;
    });

    main.innerHTML = html;

    main.querySelectorAll('input[type="checkbox"][data-id]').forEach(cb => {
      cb.addEventListener('change', (e) => {
        const id = e.target.getAttribute('data-id');
        if (e.target.checked) state.readIds.add(id);
        else state.readIds.delete(id);
        saveReadIds();
        e.target.closest('.card').classList.toggle('is-read', e.target.checked);
      });
    });
  }

  document.querySelectorAll('.chip[data-source]').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip[data-source]').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      state.sourceFilter = chip.getAttribute('data-source');
      render();
    });
  });

  document.getElementById('unreadOnly').addEventListener('click', (e) => {
    state.unreadOnly = !state.unreadOnly;
    e.target.classList.toggle('active', state.unreadOnly);
    render();
  });

  document.getElementById('searchInput').addEventListener('input', (e) => {
    state.query = e.target.value.trim();
    render();
  });

  fetch('data/articles.json?_=' + Date.now())
    .then(res => res.json())
    .then(data => {
      state.articles = data;
      render();
    })
    .catch(err => {
      document.getElementById('main').innerHTML =
        '<div class="empty-state">데이터를 불러오지 못했어요.<br>data/articles.json 파일이 있는지 확인해주세요.</div>';
      console.error(err);
    });
</script>

</body>
</html>
