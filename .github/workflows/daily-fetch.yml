name: Daily News Fetch

on:
  schedule:
    # 매일 UTC 21:00 = 한국시간(KST) 06:00 에 자동 실행
    - cron: "0 21 * * *"
  # 저장소 Actions 탭에서 수동으로도 실행 가능하게 해줌 (테스트용)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch script
        run: python scripts/fetch_news.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily news fetch $(date -u +'%Y-%m-%d')"
          git push
